{% extends "!theme/base.html" %}

{% block head %}
{{ super() }}
<style>
    footer .license-info {
        margin-top: 0.5em;
        font-size: 0.9em;
    }
</style>
<script>
// Remove stale GA-era cookie consent key left in returning visitors' browsers
localStorage.removeItem('cookieConsent');
// Add license information to footer
document.addEventListener('DOMContentLoaded', function() {
    var footer = document.querySelector('footer p');
    if (footer) {
        var licenseInfo = document.createElement('p');
        licenseInfo.className = 'license-info';
        licenseInfo.innerHTML = 'Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" rel="license">CC BY-SA 4.0</a> &middot; Code licensed under <a href="https://www.gnu.org/licenses/gpl-3.0.html">GPLv3</a>';
        footer.parentNode.appendChild(licenseInfo);
    }
});
</script>
{% block opengraph %}
<meta property="og:site_name" content="{{ SITENAME }}" />
<meta property="og:locale" content="{{ DEFAULT_LANG }}" />
<meta property="og:type" content="website" />
<meta property="og:title" content="{{ SITENAME }}" />
<meta property="og:description" content="{{ SITESUBTITLE }}" />
<meta property="og:url" content="{{ SITEURL }}/" />
<meta property="og:image" content="{{ SITEURL }}/{{ OG_DEFAULT_IMAGE }}" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="{{ SITENAME }}" />
<meta name="twitter:description" content="{{ SITESUBTITLE }}" />
<meta name="twitter:image" content="{{ SITEURL }}/{{ OG_DEFAULT_IMAGE }}" />
{% endblock opengraph %}
{% block canonical %}{% endblock canonical %}
{% block jsonld %}
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebSite","name":{{ SITENAME|tojson }},"description":{{ SITESUBTITLE|tojson }},"url":{{ SITEURL|tojson }}}
</script>
{% endblock jsonld %}
{% endblock head %}
