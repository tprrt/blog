{% extends "!theme/article.html" %}

{% block opengraph %}
{% if not article.description %}<meta name="description" content="{{ article.summary|striptags|truncate(160) }}" />
{% endif %}
<meta property="og:site_name" content="{{ SITENAME }}" />
<meta property="og:locale" content="{{ DEFAULT_LANG }}" />
<meta property="og:type" content="article" />
<meta property="og:title" content="{{ article.title }}" />
<meta property="og:description" content="{{ article.summary|striptags|truncate(200) }}" />
<meta property="og:url" content="{{ SITEURL }}/{{ article.url }}" />
<meta property="article:published_time" content="{{ article.date.isoformat() }}" />
{% if article.modified %}
<meta property="article:modified_time" content="{{ article.modified.isoformat() }}" />
{% endif %}
{% for tag in article.tags %}
<meta property="article:tag" content="{{ tag }}" />
{% endfor %}
{% endblock opengraph %}

{% block canonical %}
<link rel="canonical" href="{{ SITEURL }}/{{ article.url }}" />
{% endblock canonical %}

{% block jsonld %}
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"BlogPosting","headline":{{ article.title|tojson }},"description":{{ article.summary|striptags|truncate(200)|tojson }},"datePublished":{{ article.date.isoformat()|tojson }}{% if article.modified %},"dateModified":{{ article.modified.isoformat()|tojson }}{% endif %},"author":{"@type":"Person","name":{{ article.author|string|tojson }}},"url":{{ (SITEURL ~ "/" ~ article.url)|tojson }}}
</script>
{% endblock jsonld %}
